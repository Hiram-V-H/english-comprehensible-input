[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = sqlite+aiosqlite:///C:/Users/18277/Documents/AAA%E4%B8%AA%E4%BA%BA%E6%96%87%E6%A1%A3/Agent/%E8%8B%B1%E8%AF%AD%E5%8F%AF%E7%90%86%E8%A7%A3%E8%BE%93%E5%85%A5%E5%AD%A6%E4%B9%A0%E7%A8%8B%E5%BA%8F/data/database.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
